# 工作习惯
work_habits:
  - habit: "喜欢先看大纲再写内容"
    frequency: "always"
    context: "写作、规划、设计"
    observed_count: 10
    first_observed: "2026-01-01"
    examples:
      - "写文章前先列提纲"
      - "做项目前先画架构图"
      
  - habit: "偏好 10-20 分钟颗粒度的任务拆解"
    frequency: "often"
    context: "任务规划"
    observed_count: 8
    first_observed: "2026-01-01"
    examples:
      - "将大任务拆成可执行的小步骤"
      - "每个任务控制在 20 分钟内"
      
  - habit: "产出必须可复用"
    frequency: "always"
    context: "工作产出"
    observed_count: 15
    first_observed: "2026-01-01"
    examples:
      - "写 SOP 而不是一次性笔记"
      - "做模板而不是单次文档"

# 沟通风格
communication_style:
  preferred_format: "结构化、分层次"
  response_length: "moderate"
  tone: "专业但不失温度"
  examples:
    - "先给结论，再给论据"
    - "用列表和层级组织信息"
    - "避免冗长的铺垫"

