    description: "优先做能持续积累价值的事，用复利视角评估机会"
    origin: "多年工作和投资经验的沉淀"
    priority: 1
    
  - value: "理性、证据、边界感"
    description: "基于事实和数据做决策，尊重边界，不越界"
    origin: "专业训练和价值观塑造"
    priority: 2
    
  - value: "系统化思维"
    description: "看问题先看全局和结构，建系统而非做单点"
    origin: "产品经理职业素养"
    priority: 3
    
  - value: "高标准的专业感与审美感"
    description: "对产出质量有要求，追求专业和美感的统一"
    origin: "个人追求"
    priority: 4
    
  - value: "松弛与创造并存"
    description: "在松弛的状态下保持创造力，不被焦虑驱动"
    origin: "人生阶段的领悟"
    priority: 5

# 人生信念
life_beliefs:
  - belief: "持续学习是应对不确定性的最好方式"
    why: "世界变化快，唯有学习能力是永恒的竞争力"
    
  - belief: "创造价值是最好的自我实现"
    why: "通过创造帮助他人，同时实现自我价值"
    
  - belief: "家庭和健康是一切的基础"
    why: "没有健康的身体和和谐的家庭，其他都是空谈"

# 性格特征
personality_traits:
  - trait: "内向型"
    manifestation: "喜欢深度思考，需要独处时间恢复能量"
    
  - trait: "分析型"
    manifestation: "遇事先分析，喜欢用数据和逻辑说话"
    
  - trait: "完美主义（可控）"
    manifestation: "对产出有要求，但能接受'足够好'而非'完美'"

# 决策原则
decision_principles:
  - principle: "长期主义优先"
    priority: 1
    examples:
      - "选择能持续积累的事"
      - "不做短期有利但长期有害的事"
      
  - principle: "先人后事"
    priority: 2
    examples:
      - "家庭和健康是硬约束"
      - "合作伙伴的选择比项目更重要"
      
  - principle: "低成本验证"
    priority: 3
    examples:
      - "用最小成本验证假设"
      - "避免过早优化"
      
  - principle: "用复利视角检验机会"
    priority: 4
    examples:
      - "不做低回报的忙碌"
      - "优先做能产生复利的事"

# 约束条件
constraints:
