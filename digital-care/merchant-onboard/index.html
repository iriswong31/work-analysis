<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>数字关爱平台 · 智能助手 Demo</title>
<style>
:root {
  --primary: #E84142;
  --primary-light: #FF6B6B;
  --primary-lighter: #FFE8E8;
  --primary-bg: #FFD6D6;
  --green: #4CAF50;
  --orange: #FF9800;
  --blue: #1565C0;
  --text-primary: #333;
  --text-secondary: #666;
  --text-light: #999;
  --bg-gray: #F7F8FA;
  --border: #F0F0F0;
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --transition: all 0.3s ease;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Helvetica Neue', sans-serif;
  background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
  color: var(--text-primary);
  line-height: 1.6;
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}

.demo-banner {
  position: fixed; top: 0; left: 0; right: 0;
  background: linear-gradient(90deg, #E84142, #FF6B6B);
  color: white; text-align: center; padding: 8px;
  font-size: 13px; font-weight: 500; z-index: 1000;
}
.demo-banner span { opacity: 0.85; font-weight: 400; margin-left: 8px; font-size: 12px; }

.phone-frame {
  width: 390px; height: 844px; background: white;
  border-radius: 40px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15), 0 0 0 2px rgba(0,0,0,0.05);
  overflow: hidden; flex-shrink: 0;
  display: flex; flex-direction: column;
  position: relative;
}

.wx-status-bar {
  height: 50px;
  display: flex; align-items: flex-end; justify-content: space-between;
  padding: 0 16px 6px;
  position: relative; z-index: 10;
  flex-shrink: 0;
}
.wx-status-right { margin-left: auto; }
.wx-capsule {
  display: flex; align-items: center;
  background: rgba(0,0,0,0.06);
  border-radius: 16px;
  padding: 4px 10px;
  gap: 6px;
  font-size: 12px;
  color: #666;
  border: 0.5px solid rgba(0,0,0,0.08);
}
.wx-dots { font-size: 10px; letter-spacing: 1px; }
.wx-divider { width: 0.5px; height: 14px; background: rgba(0,0,0,0.15); }
.wx-close { font-size: 13px; }

.view-container {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex; flex-direction: column;
  background: white;
  z-index: 1;
}
.view-hidden { display: none !important; }

.view-slide-in-right { animation: slideInRight 0.35s ease forwards; }
.view-slide-out-left { animation: slideOutLeft 0.35s ease forwards; }
.view-slide-in-left { animation: slideInLeft 0.35s ease forwards; }
.view-slide-out-right { animation: slideOutRight 0.35s ease forwards; }
@keyframes slideInRight { from { transform: translateX(100%); opacity: 0.8; } to { transform: translateX(0); opacity: 1; } }
@keyframes slideOutLeft { from { transform: translateX(0); opacity: 1; } to { transform: translateX(-30%); opacity: 0; } }
@keyframes slideInLeft { from { transform: translateX(-30%); opacity: 0.8; } to { transform: translateX(0); opacity: 1; } }
@keyframes slideOutRight { from { transform: translateX(0); opacity: 1; } to { transform: translateX(100%); opacity: 0; } }

/* ===== 首页 ===== */
.home-screenshot-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #F5F0EE;
}
.home-screenshot-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top center;
  display: block;
}
/* ===== 首页底部Tab栏 ===== */
.home-tab-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 70px;
  background: white;
  display: flex;
  align-items: center;
  justify-content: space-around;
  z-index: 30;
  border-top: 0.5px solid rgba(0,0,0,0.08);
  padding-bottom: env(safe-area-inset-bottom, 0);
}
.home-tab-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  cursor: pointer;
  border: none;
  background: none;
  padding: 8px 0;
  min-width: 70px;
  transition: var(--transition);
}
.home-tab-item:active { transform: scale(0.92); }
.home-tab-icon-img {
  width: 26px;
  height: 26px;
}
.home-tab-label {
  font-size: 11px;
  font-weight: 500;
  color: #999;
}
.home-tab-label.active {
  color: var(--primary);
  font-weight: 600;
}

/* 中间突出的太阳花按钮 */
.home-tab-center {
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  border: none;
  background: none;
  padding: 0;
  margin-top: -36px;
  transition: var(--transition);
}
.home-tab-center:active { transform: scale(0.9); }
.sunflower-btn-img {
  width: 68px;
  height: 68px;
  border-radius: 50%;
  object-fit: cover;
  box-shadow: 0 2px 12px rgba(0,0,0,0.1);
}

/* ===== 智能小助手页 ===== */
.asst-status { background: linear-gradient(180deg, #FFF5F2, #FFF0ED); }
.asst-nav-bar {
  height: 44px; background: white;
  display: flex; align-items: center; justify-content: center;
  position: relative; flex-shrink: 0;
  border-bottom: 1px solid rgba(0,0,0,0.04);
}
.asst-back-btn {
  position: absolute; left: 12px;
  width: 32px; height: 32px; border: none; background: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; border-radius: 50%;
  transition: var(--transition);
}
.asst-back-btn:hover { background: rgba(0,0,0,0.05); }
.asst-nav-title { font-size: 17px; font-weight: 600; color: var(--text-primary); }
.asst-nav-right { position: absolute; right: 12px; }

.asst-scroll {
  flex: 1; overflow-y: auto; overflow-x: hidden;
  background: linear-gradient(180deg, #FFF5F2 0%, #FFF0ED 10%, #FAFAFA 35%, #F5F5F5 100%);
}
.asst-scroll::-webkit-scrollbar { width: 0; }

/* 新版Hero区域：横排吉祥物+文案 */
.asst-hero-new {
  padding: 16px 20px 8px;
}
.asst-hero-row {
  display: flex;
  align-items: center;
  gap: 8px;
}
.asst-mascot-new {
  flex-shrink: 0;
}
.asst-greeting-new {
  flex: 1;
}
.asst-greeting-title-new {
  font-size: 20px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.4;
  margin-bottom: 6px;
}
.asst-greeting-sub-new {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.6;
}

/* 新版身份卡片：2x2网格 */
.asst-role-section-new {
  padding: 8px 20px 20px;
}
.asst-role-label-new {
  font-size: 13px;
  color: var(--text-light);
  font-weight: 500;
  margin-bottom: 12px;
}
.asst-role-grid-new {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.asst-role-card-new {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  padding: 16px 10px;
  background: white;
  border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: var(--transition);
  border: 1.5px solid transparent;
  position: relative;
  text-align: center;
}
.asst-role-card-new:active { transform: scale(0.97); }
.asst-role-card-new.asst-role-enabled:hover { border-color: var(--primary-light); background: #FFF8F8; }
.asst-role-card-new.asst-role-disabled { opacity: 0.55; }
.asst-role-card-new.asst-role-disabled:hover { opacity: 0.65; }
.asst-role-icon-wrap-new {
  width: 44px; height: 44px; border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
}
.asst-role-icon-new { font-size: 24px; }
.asst-role-name-new { font-size: 15px; font-weight: 600; color: var(--text-primary); }
.asst-role-desc-new { font-size: 11px; color: var(--text-light); line-height: 1.4; }
.asst-role-badge-new {
  position: absolute; top: 6px; right: 8px;
  background: linear-gradient(135deg, #FF7B7B, #E84142);
  color: white; font-size: 9px; font-weight: 600;
  padding: 1px 6px; border-radius: 8px;
}
.asst-badge-soon-new { background: linear-gradient(135deg, #ccc, #aaa); }

.asst-input-area {
  padding: 8px 16px 28px; background: white;
  border-top: 1px solid var(--border); flex-shrink: 0;
}
.asst-input-wrapper {
  display: flex; align-items: center; gap: 8px;
  background: #F5F6F8; border-radius: 24px; padding: 6px 6px 6px 16px;
}
.asst-input {
  flex: 1; border: none; background: transparent;
  font-size: 14px; outline: none; color: var(--text-light);
}
.asst-send-btn {
  width: 34px; height: 34px; border-radius: 50%; border: none;
  background: #F0F0F0;
  display: flex; align-items: center; justify-content: center;
  cursor: default; flex-shrink: 0;
}

/* ===== 对话视图 ===== */
.chat-status { background: linear-gradient(180deg, #FFF5F2, #FFF0ED); }
.chat-nav-bar {
  height: 44px; background: white;
  display: flex; align-items: center; justify-content: center;
  position: relative; flex-shrink: 0;
  border-bottom: 1px solid rgba(0,0,0,0.04);
}
.chat-back-btn, .cs-back-btn {
  position: absolute; left: 12px;
  width: 32px; height: 32px; border: none; background: none;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; border-radius: 50%;
  transition: var(--transition);
}
.chat-back-btn:hover, .cs-back-btn:hover { background: rgba(0,0,0,0.05); }
.chat-nav-title { font-size: 17px; font-weight: 600; color: var(--text-primary); }
.chat-nav-right { position: absolute; right: 12px; }

.chat-area {
  flex: 1; overflow-y: auto;
  background: linear-gradient(180deg, #FFF5F2 0%, #FAFAFA 15%, white 40%);
}
.chat-area::-webkit-scrollbar { width: 0; }

.chat-welcome-section {
  display: flex; flex-direction: column; align-items: center;
  padding: 30px 20px 16px; text-align: center;
}
.chat-welcome-mascot { margin-bottom: 8px; }
.chat-heart-svg { width: 72px; height: 72px; }
.chat-welcome-title { font-size: 20px; font-weight: 700; color: var(--text-primary); margin-bottom: 6px; }
.chat-welcome-sub { font-size: 13px; color: var(--text-secondary); }

.feature-list {
  padding: 0 20px 20px;
  display: flex; flex-direction: column; gap: 10px;
}
.feature-chip {
  display: flex; align-items: center; gap: 12px;
  padding: 14px 16px; background: white;
  border-radius: var(--radius-md); box-shadow: var(--shadow-sm);
  cursor: pointer; transition: var(--transition);
  border: 1.5px solid transparent;
}
.feature-chip:hover { border-color: var(--primary-light); background: #FFF8F8; }
.feature-chip:active { transform: scale(0.98); }
.feature-chip-icon { font-size: 24px; }
.feature-chip-name { font-size: 15px; font-weight: 600; color: var(--text-primary); flex: 1; }

/* 即将上线的灰色卡片 */
.feature-chip-disabled {
  opacity: 0.5; cursor: default; pointer-events: none;
  background: #F8F9FA; border-color: #E8E8E8;
}
.feature-chip-disabled .feature-chip-name { color: var(--text-light); }
.feature-chip-soon {
  font-size: 10px; color: white; background: #BDBDBD;
  padding: 2px 8px; border-radius: 10px; font-weight: 500;
  flex-shrink: 0;
}

.scenario-choices { padding: 8px 0; display: flex; flex-direction: column; gap: 8px; }
.scenario-choice-item {
  display: flex; align-items: center; gap: 10px;
  padding: 12px 14px; background: white; border-radius: var(--radius-md);
  box-shadow: var(--shadow-sm); cursor: pointer;
  transition: var(--transition); border: 1.5px solid var(--border);
}
.scenario-choice-item:hover { border-color: var(--primary-light); background: #FFF8F8; }
.scenario-choice-item:active { transform: scale(0.98); }
.scenario-choice-icon { font-size: 22px; flex-shrink: 0; }
.scenario-choice-info { flex: 1; }
.scenario-choice-name { font-size: 14px; font-weight: 600; color: var(--text-primary); }
.scenario-choice-desc { font-size: 12px; color: var(--text-light); margin-top: 2px; }

.messages-container { padding: 16px; display: flex; flex-direction: column; gap: 14px; }
.msg { display: flex; gap: 8px; max-width: 88%; animation: msgIn 0.35s ease; }
@keyframes msgIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
.msg.bot { align-self: flex-start; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg .avatar {
  width: 32px; height: 32px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; overflow: hidden;
}
.msg.bot .avatar { background: white; box-shadow: var(--shadow-sm); }
.mini-heart-avatar { width: 28px; height: 28px; }
.msg .bubble {
  padding: 10px 12px; border-radius: var(--radius-md);
  font-size: 13px; line-height: 1.6; word-break: break-word;
  max-width: 100%; overflow: hidden;
}
.msg.bot .bubble { background: white; color: var(--text-primary); border-top-left-radius: 4px; box-shadow: var(--shadow-sm); }
.msg.user .bubble { background: linear-gradient(135deg, #FF7B7B, #E84142); color: white; border-top-right-radius: 4px; }

.screenshot-preview { width: 160px; border-radius: 8px; margin-top: 6px; box-shadow: var(--shadow-sm); }

.thinking-indicator { display: flex; align-items: center; gap: 8px; padding: 2px 0; }
.thinking-indicator .think-text { font-size: 14px; color: var(--text-secondary); font-weight: 500; }
.thinking-skeleton { margin-top: 8px; display: flex; flex-direction: column; gap: 8px; }
.skeleton-line {
  height: 12px; border-radius: 6px;
  background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
  background-size: 200% 100%; animation: shimmer 1.5s infinite;
}
.skeleton-line:nth-child(1) { width: 100%; }
.skeleton-line:nth-child(2) { width: 85%; }
.skeleton-line:nth-child(3) { width: 65%; }
@keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

.tool-call {
  background: #F7F8FA; border-radius: var(--radius-sm);
  padding: 10px 12px; margin-top: 8px; border-left: 3px solid var(--primary);
}
.tool-call .tool-name { font-weight: 600; color: var(--primary); font-size: 12px; margin-bottom: 4px; }
.tool-call .tool-params {
  color: var(--text-light); font-family: 'SF Mono', monospace; font-size: 11px;
  background: white; padding: 6px 8px; border-radius: 6px; margin-top: 4px;
  max-height: 60px; overflow: hidden; word-break: break-all;
}
.tool-call .tool-result { color: var(--green); font-weight: 500; margin-top: 4px; font-size: 12px; }

.info-card { background: #F8F9FA; border-radius: var(--radius-sm); padding: 8px 10px; margin-top: 8px; }
.info-card .row { display: flex; gap: 4px; padding: 3px 0; font-size: 12px; }
.info-card .row .label { color: var(--text-light); flex-shrink: 0; min-width: 60px; font-size: 11px; }
.info-card .row .value { color: var(--text-primary); font-weight: 500; word-break: break-all; }

.extracted-info {
  background: linear-gradient(135deg, #E8F5E9, #F1F8E9);
  border: 1px solid #C8E6C9; border-radius: var(--radius-sm);
  padding: 8px 10px; margin-top: 8px;
}
.extracted-info .ext-title { font-size: 12px; color: #2E7D32; font-weight: 600; margin-bottom: 4px; }
.ext-row { display: flex; align-items: flex-start; gap: 4px; padding: 2px 0; font-size: 12px; line-height: 1.5; }
.ext-row .check { color: var(--green); }
.ext-row .missing { color: var(--orange); }

.missing-info {
  background: linear-gradient(135deg, #FFF8E1, #FFFDE7);
  border: 1px solid #FFF176; border-radius: var(--radius-sm);
  padding: 10px 12px; margin-top: 8px;
}
.missing-info .ext-title { font-size: 12px; color: #E65100; font-weight: 600; margin-bottom: 6px; }

.activity-recommend {
  background: linear-gradient(135deg, #FFF3E0, #FFF8E1);
  border: 1px solid #FFE0B2; border-radius: var(--radius-sm);
  padding: 10px; margin-top: 8px;
}
.activity-recommend .rec-title { font-size: 12px; font-weight: 600; color: #E65100; margin-bottom: 6px; }
.rec-item {
  display: flex; align-items: flex-start; gap: 6px;
  padding: 6px 8px; background: white; border-radius: 8px;
  margin-bottom: 4px; cursor: pointer;
  transition: var(--transition); border: 2px solid transparent;
}
.rec-item:last-child { margin-bottom: 0; }
.rec-item:hover { border-color: var(--primary-light); background: #FFF5F5; }
.rec-item:active { transform: scale(0.98); }
.rec-item .rec-icon { font-size: 20px; flex-shrink: 0; margin-top: 2px; }
.rec-item .rec-info { flex: 1; min-width: 0; }
.rec-item .rec-name { font-size: 12px; font-weight: 600; color: var(--text-primary); }
.rec-item .rec-desc { font-size: 10px; color: var(--text-secondary); margin-top: 2px; line-height: 1.4; }
.rec-item .rec-tag {
  display: inline-block; font-size: 9px;
  background: var(--primary-lighter); color: var(--primary);
  padding: 1px 5px; border-radius: 4px; margin-top: 3px;
}

.confirm-buttons { display: flex; gap: 8px; margin-top: 10px; }
.confirm-buttons button {
  padding: 6px 18px; border-radius: 20px; font-size: 13px;
  cursor: pointer; border: none; font-weight: 500;
  transition: var(--transition);
}
.btn-primary { background: linear-gradient(135deg, #FF7B7B, #E84142); color: white; }
.btn-primary:hover { opacity: 0.85; }
.btn-outline { background: white; color: var(--text-secondary); border: 1px solid #ddd !important; }
.btn-outline:hover { border-color: var(--primary) !important; color: var(--primary); }

.quick-reply-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
.quick-chip {
  padding: 6px 12px; border-radius: 16px; font-size: 12px;
  background: white; color: var(--primary); border: 1px solid var(--primary-lighter);
  cursor: pointer; transition: var(--transition);
}
.quick-chip:hover { background: var(--primary); color: white; border-color: var(--primary); }

/* ===== 用户手动触发操作提示 ===== */
.user-action-hint {
  display: flex; justify-content: flex-end; margin-top: 4px;
  animation: msgIn 0.35s ease;
}
.user-action-btn {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 10px 20px; border-radius: 16px;
  background: linear-gradient(135deg, #E8F4FD, #D6ECFF);
  border: 2px dashed #90CAF9; cursor: pointer;
  transition: all 0.2s ease;
}
.user-action-btn:hover {
  background: linear-gradient(135deg, #BBDEFB, #90CAF9);
  border-color: #42A5F5; transform: scale(1.02);
}
.user-action-btn:active { transform: scale(0.97); }
.user-action-text {
  font-size: 13px; font-weight: 600; color: #1565C0;
}
.user-action-tap {
  font-size: 10px; color: #64B5F6; font-weight: 500;
}

.compare-inline { margin-top: 4px; }
.compare-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.compare-label { font-size: 12px; color: var(--text-secondary); width: 60px; flex-shrink: 0; }
.compare-bar-wrap { flex: 1; height: 22px; background: #F5F6F8; border-radius: 11px; overflow: hidden; }
.compare-bar-fill {
  height: 100%; border-radius: 11px;
  display: flex; align-items: center; justify-content: flex-end;
  padding-right: 8px; font-size: 11px; font-weight: 600; color: white;
  transition: width 1.2s cubic-bezier(0.4,0,0.2,1);
}
.compare-bar-fill.old { background: #ccc; }
.compare-bar-fill.new { background: linear-gradient(90deg, #FF7B7B, #E84142); }
.summary-box {
  background: linear-gradient(135deg, #FFF3F3, #FFEBEB);
  border-radius: var(--radius-sm); padding: 12px;
  font-size: 13px; line-height: 1.8; color: var(--text-secondary);
  margin-top: 4px;
}
.summary-box b { color: var(--primary); }
.highlight-num { display: inline-block; font-size: 24px; font-weight: 800; color: var(--primary); margin: 0 2px; }

.chat-model-credit { text-align: center; padding: 6px; font-size: 11px; color: var(--text-light); flex-shrink: 0; }
.chat-input-area {
  padding: 8px 16px 28px; background: white;
  border-top: 1px solid var(--border); flex-shrink: 0;
}
.chat-input-wrapper {
  display: flex; align-items: center; gap: 8px;
  background: #F5F6F8; border-radius: 24px; padding: 6px 6px 6px 12px;
}
.chat-img-btn {
  width: 32px; height: 32px; border-radius: 50%; border: none;
  background: transparent; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: var(--transition); flex-shrink: 0;
}
.chat-img-btn:hover { background: rgba(0,0,0,0.05); }
.chat-input-wrapper input {
  flex: 1; border: none; background: transparent;
  font-size: 14px; outline: none;
}
.chat-input-wrapper input::placeholder { color: #C0C0C0; }
.chat-send-btn {
  width: 34px; height: 34px; border-radius: 50%; border: none;
  background: linear-gradient(135deg, #FF7B7B, #E84142);

<script>
  document.addEventListener('DOMContentLoaded', () => {
    HomeController.init();
    Router.init();
    document.addEventListener('viewEnter', (e) => {
      const { view, params } = e.detail;
      if (view === 'chat' && params.roleId) {
        ChatEngine.init(params.roleId);
        ChatUI.init(params.roleId);
      }
    });
  });
</script>
