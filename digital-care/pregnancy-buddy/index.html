<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>孕期搭子 - AI孕期陪伴助手</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;600;700&display=swap');
        
        :root {
            --primary: #E8A0BF;
            --primary-dark: #C88EA7;
            --primary-deep: #A084CA;
            --bg-warm: #FFFAF5;
            --bg-chat: #FFF8F0;
            --bg-white: #FFFFFF;
            --bg-input: #F7F3EE;
            --text-dark: #4A3548;
            --text-mid: #6B5B6E;
            --text-light: #9B8E9E;
            --bubble-ai: #FFFFFF;
            --bubble-user: linear-gradient(135deg, #E8A0BF, #C4A0D4);
            --green: #7BC67E;
            --orange: #F5A623;
        }
        
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Noto Sans SC','PingFang SC',-apple-system,sans-serif; -webkit-font-smoothing:antialiased; }
        
        body {
            background: linear-gradient(135deg, #f5f0ff 0%, #fdf2f8 50%, #fff5f7 100%);
            min-height: 100vh;
            display: flex; justify-content: center; align-items: center;
            padding: 20px;
        }
        
        .phone-frame {
            width: 390px; height: 844px;
            background: var(--bg-warm);
            border-radius: 40px;
            box-shadow: 0 25px 80px rgba(168,132,202,0.15), 0 10px 30px rgba(232,160,191,0.1), inset 0 0 0 1px rgba(255,255,255,0.8);
            overflow: hidden; position: relative;
            display: flex; flex-direction: column;
        }
        
        /* Status Bar */
        .status-bar {
            height: 50px; padding: 10px 24px 0;
            display: flex; align-items: center; justify-content: space-between;
            background: var(--bg-white);
            flex-shrink: 0;
        }
        .status-bar .time { font-size:14px; font-weight:600; color:var(--text-dark); }
        .status-bar .icons { display:flex; gap:6px; }
        .status-bar .icons span { font-size:12px; }
        
        /* Top Header */
        .top-header {
            background: var(--bg-white);
            padding: 8px 20px 12px;
            border-bottom: 1px solid rgba(232,160,191,0.1);
            flex-shrink: 0;
        }
        .header-row {
            display: flex; align-items: center; gap: 12px;
        }
        .avatar-circle {
            width: 42px; height: 42px; border-radius: 50%;
            background: linear-gradient(135deg, #fce4ec, #f3e5f5);
            display: flex; align-items: center; justify-content: center;
            font-size: 22px; flex-shrink: 0;
        }
        .header-info { flex: 1; }
        .header-title { font-size: 17px; font-weight: 600; color: var(--text-dark); }
        .header-sub { font-size: 12px; color: var(--text-light); margin-top: 1px; }

        /* Week badge */
        .week-badge {
            background: linear-gradient(135deg, rgba(232,160,191,0.12), rgba(160,132,202,0.12));
            border-radius: 20px; padding: 6px 14px;
            display: flex; align-items: center; gap: 6px;
            margin-top: 10px; cursor: pointer; transition: all 0.2s;
        }
        .week-badge:hover { background: linear-gradient(135deg, rgba(232,160,191,0.2), rgba(160,132,202,0.2)); }
        .week-badge .week-text { font-size: 13px; font-weight: 500; color: var(--text-dark); }
        .week-badge .week-edit { font-size: 11px; color: var(--primary-dark); margin-left: auto; }

        /* Chat area */
        .chat-area {
            flex: 1; overflow-y: auto; padding: 16px 16px 8px;
            scroll-behavior: smooth;
        }
        .chat-area::-webkit-scrollbar { width: 0; }
        
        /* Messages */
        .msg { display: flex; gap: 8px; margin-bottom: 16px; animation: msgIn 0.4s ease; }
        .msg.ai { align-items: flex-start; }
        .msg.user { flex-direction: row-reverse; }
        
        .msg-avatar {
            width: 34px; height: 34px; border-radius: 50%;
            background: linear-gradient(135deg, #fce4ec, #f3e5f5);
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; flex-shrink: 0;
        }
        .msg.user .msg-avatar { background: linear-gradient(135deg, #e8eaf6, #d1c4e9); }
        
        .msg-bubble {
            max-width: 75%; border-radius: 18px; padding: 12px 16px;
            font-size: 14px; line-height: 1.7; color: var(--text-dark);
            position: relative;
        }
        .msg.ai .msg-bubble {
            background: var(--bubble-ai);
            border-top-left-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }
        .msg.user .msg-bubble {
            background: var(--bubble-user);
            border-top-right-radius: 4px;
            color: white;
        }
        
        /* Card in chat */
        .chat-card {
            background: var(--bg-white);
            border-radius: 16px;
            padding: 16px;
            box-shadow: 0 2px 12px rgba(168,132,202,0.06);
            border: 1px solid rgba(232,160,191,0.1);
            max-width: 85%;
            margin-left: 42px;
            margin-bottom: 16px;
            animation: msgIn 0.4s ease;
        }
        .card-title { font-size: 14px; font-weight: 600; color: var(--text-dark); margin-bottom: 8px; }
        .card-body { font-size: 13px; color: var(--text-mid); line-height: 1.7; }
        
        /* Baby dev card */
        .baby-dev-card {
            background: linear-gradient(135deg, #fdf2f8, #f8f4ff);
            border-radius: 16px; padding: 16px;
            text-align: center;
            max-width: 85%; margin-left: 42px; margin-bottom: 16px;
            animation: msgIn 0.4s ease;
        }
        .baby-emoji { font-size: 52px; margin-bottom: 8px; animation: float 4s ease-in-out infinite; display: inline-block; }
        .baby-size { font-size: 13px; color: var(--text-dark); font-weight: 500; margin-bottom: 4px; }
        .baby-stats { display: flex; justify-content: center; gap: 16px; margin-top: 8px; }
        .baby-stat { text-align: center; }
        .baby-stat .val { font-size: 15px; font-weight: 600; color: var(--text-dark); }
        .baby-stat .lbl { font-size: 11px; color: var(--text-light); }

        /* Quick actions */
        .quick-actions {
            display: flex; flex-wrap: wrap; gap: 8px;
            padding: 4px 16px 12px; margin-left: 42px;
            animation: msgIn 0.4s ease;
        }
        .quick-btn {
            border: 1.5px solid rgba(232,160,191,0.25);
            background: var(--bg-white);
            border-radius: 20px;
            padding: 8px 14px;
            font-size: 13px; font-weight: 500;
            color: var(--primary-dark);
            cursor: pointer;
            transition: all 0.2s;
        }
        .quick-btn:hover { background: rgba(232,160,191,0.08); border-color: var(--primary); }
        .quick-btn:active { transform: scale(0.96); }
        
        /* Input bar */
        .input-bar {
            padding: 8px 16px 24px;
            background: var(--bg-white);
            border-top: 1px solid rgba(232,160,191,0.08);
            display: flex; align-items: center; gap: 8px;
            flex-shrink: 0;
        }
        .input-box {
            flex: 1; border: 1.5px solid rgba(232,160,191,0.2);
            border-radius: 22px; padding: 10px 16px;
            font-size: 14px; color: var(--text-dark);
            background: var(--bg-input);
            outline: none; transition: border-color 0.2s;
        }
        .input-box::placeholder { color: var(--text-light); }
        .input-box:focus { border-color: var(--primary); }
        .send-btn {
            width: 40px; height: 40px; border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-deep));
            border: none; color: white; font-size: 18px;
            cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .send-btn:hover { transform: scale(1.05); }
        .send-btn:active { transform: scale(0.95); }
        
        /* Date input modal */
        .modal-overlay {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(74,53,72,0.4);
            backdrop-filter: blur(4px);
            display: flex; align-items: center; justify-content: center;
            z-index: 100; animation: fadeIn 0.3s ease;
        }
        .modal-overlay.hidden { display: none; }
        .modal-box {
            background: var(--bg-white);
            border-radius: 24px; padding: 28px 24px;
            width: 320px;
            box-shadow: 0 20px 60px rgba(168,132,202,0.2);
            animation: scaleIn 0.3s ease;
        }
        .modal-title { font-size: 18px; font-weight: 600; color: var(--text-dark); text-align: center; margin-bottom: 4px; }
        .modal-desc { font-size: 13px; color: var(--text-light); text-align: center; margin-bottom: 20px; }
        
        .date-option {
            border: 1.5px solid rgba(232,160,191,0.2);
            border-radius: 14px; padding: 14px 16px;
            margin-bottom: 10px; cursor: pointer;
            transition: all 0.2s;
        }
        .date-option:hover { border-color: var(--primary); background: rgba(253,242,248,0.3); }
        .date-option.active { border-color: var(--primary); background: rgba(253,242,248,0.5); }
        .date-option .opt-label { font-size: 14px; font-weight: 500; color: var(--text-dark); margin-bottom: 6px; }
        .date-input {
            width: 100%; border: 1px solid rgba(232,160,191,0.2);
            border-radius: 10px; padding: 8px 12px;
            font-size: 14px; color: var(--text-dark);
            background: var(--bg-input); outline: none;
        }
        .date-input:focus { border-color: var(--primary); }
        
        .modal-btn {
            width: 100%; padding: 12px;
            border-radius: 14px; border: none;
            background: linear-gradient(135deg, var(--primary), var(--primary-deep));
            color: white; font-size: 15px; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
            margin-top: 16px;
        }
        .modal-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(232,160,191,0.3); }
        .modal-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        
        /* Typing indicator */
        .typing { display: flex; gap: 4px; padding: 4px 0; }
        .typing span {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--text-light);
            animation: bounce 1.4s ease-in-out infinite;
        }
        .typing span:nth-child(2) { animation-delay: 0.2s; }
        .typing span:nth-child(3) { animation-delay: 0.4s; }
        
        /* Report items in chat */
        .report-item-chat {
            display: flex; align-items: flex-start; gap: 8px;
            padding: 6px 0; border-bottom: 1px solid rgba(0,0,0,0.04);
        }
        .report-item-chat:last-child { border-bottom: none; }
        .report-icon { font-size: 14px; margin-top: 2px; }
        .report-name { font-size: 13px; font-weight: 500; color: var(--text-dark); }
        .report-detail { font-size: 12px; color: var(--text-mid); line-height: 1.5; margin-top: 2px; }

        /* Animations */
        @keyframes msgIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
        @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
        @keyframes scaleIn { from { opacity:0; transform:scale(0.9); } to { opacity:1; transform:scale(1); } }
        @keyframes float { 0%,100% { transform:translateY(0); } 50% { transform:translateY(-6px); } }
        @keyframes bounce { 0%,60%,100% { transform:translateY(0); } 30% { transform:translateY(-6px); } }
        @keyframes pulse { 0%,100% { transform:scale(1); } 50% { transform:scale(1.05); } }
    </style>
</head>
<body>

</div>

<script>
// ===== Pregnancy Data =====
const BABY_DATA = {
    4: { emoji:'🫧', size:'罂粟籽', fruit:'🫧', len:'0.1cm', wt:'<1g', desc:'受精卵刚着床，小小的生命开始了最初的旅程。', milestone:'着床完成，开始分裂发育', tip:'注意补充叶酸，每天400μg' },

    9: { emoji:'🍇', size:'葡萄', fruit:'🍇', len:'2.3cm', wt:'2g', desc:'已经从"胚胎"正式升级为"胎儿"啦！小尾巴消失了~', milestone:'正式称为"胎儿"', tip:'继续补叶酸，注意饮食均衡' },
    10: { emoji:'🍓', size:'草莓', fruit:'🍓', len:'3.1cm', wt:'4g', desc:'宝宝开始在羊水里自由游泳，虽然你还感觉不到。', milestone:'开始在子宫内活动', tip:'可以做NT检查的预约了（11-13周）' },
    11: { emoji:'🍋', size:'柠檬', fruit:'🍋', len:'4.1cm', wt:'7g', desc:'小手已经能握拳了！骨骼开始硬化。', milestone:'手指可以弯曲', tip:'早孕反应可能快到高峰了，再坚持一下！' },
    12: { emoji:'🍑', size:'桃子', fruit:'🍑', len:'5.4cm', wt:'14g', desc:'所有器官都已就位，接下来就是长大和完善。度过了最关键的前三个月！', milestone:'🎉 进入安全孕中期', tip:'⚡ 本周需做NT检查（颈项透明层筛查）' },
    13: { emoji:'🥝', size:'猕猴桃', fruit:'🥝', len:'7.4cm', wt:'23g', desc:'宝宝有了自己的指纹！独一无二的小生命。', milestone:'指纹开始形成', tip:'早孕反应应该开始缓解了~' },
    14: { emoji:'🍊', size:'橙子', fruit:'🍊', len:'8.7cm', wt:'43g', desc:'小家伙开始学做表情了——皱眉、眯眼，超级可爱。', milestone:'面部表情发育', tip:'可以做唐氏筛查了（15-20周）' },
    16: { emoji:'🥑', size:'牛油果', fruit:'🥑', len:'11.6cm', wt:'100g', desc:'骨骼在变强壮，你可能很快就能感受到第一次胎动了！', milestone:'即将感受到胎动', tip:'16-20周做唐筛或无创DNA' },
    20: { emoji:'🥭', size:'芒果', fruit:'🥭', len:'16.5cm', wt:'300g', desc:'宝宝能吞咽羊水了，在练习消化系统。味蕾也开始工作了~', milestone:'味觉系统上线', tip:'⚡ 20-24周需做大排畸/四维彩超' },

    32: { emoji:'🍍', size:'菠萝', fruit:'🍍', len:'42cm', wt:'1800g', desc:'皮下脂肪在增加，宝宝越来越像出生时的样子了。', milestone:'快速增重期', tip:'⚡ 开始准备待产包' },
    36: { emoji:'🍈', size:'哈密瓜', fruit:'🍈', len:'47cm', wt:'2600g', desc:'宝宝开始入盆，为出生做最后的准备。', milestone:'胎头入盆', tip:'⚡ 产检升级为每周一次，做GBS筛查' },
    40: { emoji:'🍉', size:'西瓜', fruit:'🍉', len:'50cm', wt:'3300g', desc:'足月啦！宝宝随时准备来到这个世界见你～', milestone:'🎉 足月！随时可能发动', tip:'关注三大信号：见红、破水、规律宫缩' }
};

// State
let state = { edd: null, lmp: null, currentWeek: 0, currentDay: 0, dateSet: false };

// ===== Date Calculation =====
function calcFromEdd(eddStr) {
    const edd = new Date(eddStr);
    const lmp = new Date(edd.getTime() - 280 * 86400000);
    const today = new Date();
    const days = Math.floor((today - lmp) / 86400000);
    const weeks = Math.floor(days / 7);
    const dayOfWeek = days % 7;
    return { weeks: Math.max(0, Math.min(42, weeks)), days: Math.max(0, dayOfWeek), lmp, edd, totalDays: days };
}

function calcFromLmp(lmpStr) {
    const lmp = new Date(lmpStr);
    const edd = new Date(lmp.getTime() + 280 * 86400000);
    return calcFromEdd(edd.toISOString().slice(0,10));
}

function getDaysUntilEdd() {
    if (!state.edd) return 0;
    const diff = Math.ceil((new Date(state.edd) - new Date()) / 86400000);
    return Math.max(0, diff);
}

function getTrimester(week) {
    if (week < 13) return '孕早期';
    if (week < 28) return '孕中期';
    return '孕晚期';
}

function getBabyData(week) {
    const keys = Object.keys(BABY_DATA).map(Number).sort((a,b) => a-b);
    let best = keys[0];
    for (const k of keys) {
        if (k <= week) best = k;
        else break;
    }
    return BABY_DATA[best];
}

// ===== UI Helpers =====
function scrollToBottom() {
    const area = document.getElementById('chatArea');
    setTimeout(() => { area.scrollTop = area.scrollHeight; }, 50);
}

function addAiMsg(html) {
    const chatArea = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = 'msg ai';
    div.innerHTML = `<div class="msg-avatar">🌸</div><div class="msg-bubble">${html}</div>`;
    chatArea.appendChild(div);
    scrollToBottom();
}

function addUserMsg(text) {
    const chatArea = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = 'msg user';
    div.innerHTML = `<div class="msg-avatar">👩</div><div class="msg-bubble">${text}</div>`;
    chatArea.appendChild(div);
    scrollToBottom();
}

function addBabyCard(data, week) {
    const chatArea = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = 'baby-dev-card';
    div.innerHTML = `
        <div class="baby-emoji">${data.emoji}</div>
        <div class="baby-size">${data.fruit} 和${data.size}差不多大</div>
        <div class="baby-stats">
            <div class="baby-stat"><div class="val">${data.len}</div><div class="lbl">身长</div></div>
            <div class="baby-stat"><div class="val">${data.wt}</div><div class="lbl">体重</div></div>
            <div class="baby-stat"><div class="val">第${week}周</div><div class="lbl">孕周</div></div>
        </div>
    `;
    chatArea.appendChild(div);
    scrollToBottom();
}

function addChatCard(title, body) {
    const chatArea = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = 'chat-card';
    div.innerHTML = `<div class="card-title">${title}</div><div class="card-body">${body}</div>`;
    chatArea.appendChild(div);
    scrollToBottom();
}

function addQuickActions(actions) {
    const chatArea = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = 'quick-actions';
    div.innerHTML = actions.map(a => `<button class="quick-btn" onclick="handleQuickAction('${a.key}')">${a.label}</button>`).join('');
    chatArea.appendChild(div);
    scrollToBottom();
}

function addTyping() {
    const chatArea = document.getElementById('chatArea');
    const div = document.createElement('div');
    div.className = 'msg ai';
    div.id = 'typingMsg';
    div.innerHTML = `<div class="msg-avatar">🌸</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>`;
    chatArea.appendChild(div);
    scrollToBottom();
}

function removeTyping() {
    const el = document.getElementById('typingMsg');
    if (el) el.remove();
}

function delay(ms) { return new Promise(r => setTimeout(r, ms)); }

// ===== Date Modal =====
function showDateModal() {
    document.getElementById('dateModal').classList.remove('hidden');
}

function selectDateMode(mode) {
    document.getElementById('optEdd').classList.toggle('active', mode === 'edd');
    document.getElementById('optLmp').classList.toggle('active', mode === 'lmp');
    document.getElementById('inputEdd').style.display = mode === 'edd' ? 'block' : 'none';
    document.getElementById('inputLmp').style.display = mode === 'lmp' ? 'block' : 'none';
}

function confirmDate() {
    const eddActive = document.getElementById('optEdd').classList.contains('active');
    let result;
    if (eddActive) {
        const v = document.getElementById('inputEdd').value;
        if (!v) return;
        result = calcFromEdd(v);
    } else {
        const v = document.getElementById('inputLmp').value;
        if (!v) return;
        result = calcFromLmp(v);
    }
    
    state.currentWeek = result.weeks;
    state.currentDay = result.days;
    state.edd = result.edd;
    state.lmp = result.lmp;
    state.dateSet = true;
    
    // Update week badge
    const daysLeft = getDaysUntilEdd();
    const trimester = getTrimester(state.currentWeek);
    document.getElementById('weekText').textContent = `${trimester} · 孕${state.currentWeek}周+${state.currentDay}天`;
    document.getElementById('weekEdit').textContent = `距预产期${daysLeft}天 ✏️`;
    
    // Hide modal
    document.getElementById('dateModal').classList.add('hidden');
    
    // Start welcome sequence
    startWelcome();
}

// ===== Welcome Sequence =====
async function startWelcome() {
    const week = state.currentWeek;
    const day = state.currentDay;
    const trimester = getTrimester(week);
    const daysLeft = getDaysUntilEdd();
    const baby = getBabyData(week);
    
    // Welcome message
    await delay(400);
    addAiMsg(`Hi 准妈妈~ 👋<br><br>我是你的<strong>孕期搭子</strong>，从现在开始，整个孕期都有我陪你！`);
    
    // Week info
    await delay(800);
    addAiMsg(`你现在 <strong>孕${week}周+${day}天</strong>，${trimester}，距预产期还有 <strong>${daysLeft}天</strong>。<br><br>宝宝现在像${baby.size}${baby.fruit}那么大了~`);
    
    // Baby card
    await delay(600);
    addBabyCard(baby, week);
    
    // Baby description
    await delay(500);
    addAiMsg(baby.desc + `<br><br>🎯 <strong>里程碑</strong>：${baby.milestone}`);
    
    // Tip
    if (baby.tip) {
        await delay(500);
        const isUrgent = baby.tip.startsWith('⚡');
        addChatCard(isUrgent ? '⚡ 重要提醒' : '💡 本周提醒', baby.tip);
    }
    
    // Quick actions based on week
    await delay(400);
    const actions = getQuickActions(week);
    addQuickActions(actions);
}

function getQuickActions(week) {
    const base = [
        { key: 'baby', label: '宝宝现在多大？ 👶' },
        { key: 'food', label: '今天吃什么好？ 🍽️' },
    ];
    
    if (week >= 8 && week < 14) base.push({ key: 'nt', label: 'NT检查是什么？ 🩺' });
    if (week >= 14 && week < 22) base.push({ key: 'anomaly', label: '大排畸什么时候做？ 🩺' });
    if (week >= 22 && week < 30) base.push({ key: 'ogtt', label: '糖耐怎么准备？ 🩺' });
    if (week >= 30) base.push({ key: 'bag', label: '待产包清单 🎒' });
    
    base.push({ key: 'mood', label: '有点焦虑... 💭' });
    return base.slice(0, 4);
}

// ===== Quick Action Handlers =====
async function handleQuickAction(key) {
    const week = state.currentWeek;
    const baby = getBabyData(week);
    
    switch(key) {
        case 'baby':
            addUserMsg('宝宝现在多大了？');
            await delay(600);
            addAiMsg(`第${week}周的小家伙，像${baby.size}${baby.fruit}那么大啦~<br><br>${baby.desc}`);
            await delay(400);
            addBabyCard(baby, week);
            break;
            
        case 'food':
            addUserMsg('今天吃什么好呀？');
            await delay(700);
            addAiMsg(getFoodAdvice(week));
            break;
            
        case 'nt':
            addUserMsg('NT检查是什么？');
            await delay(700);
            addAiMsg(`<strong>NT检查（颈项透明层筛查）</strong><br><br>📋 <strong>检查时间</strong>：孕11-13+6周<br>🎯 <strong>目的</strong>：测量胎儿颈后皮下积液的厚度，初步筛查染色体异常风险<br>⏱️ <strong>过程</strong>：B超检查，约15-20分钟<br>📊 <strong>正常值</strong>：NT值 < 2.5mm<br><br>💡 不需要空腹，不需要憋尿。如果宝宝位置不好可能需要走动一下再照~`);
            break;
            
        case 'anomaly':
            addUserMsg('大排畸什么时候做？');
            await delay(700);
            addAiMsg(`<strong>大排畸/四维彩超</strong><br><br>📋 <strong>检查时间</strong>：孕20-24周（最佳22-24周）<br>🎯 <strong>目的</strong>：系统检查胎儿各器官结构是否正常<br>⏱️ <strong>过程</strong>：约30-60分钟，宝宝配合的话更快<br><br>💡 建议提前预约！热门医院可能要提前1个月。检查前可以吃点甜食，宝宝会活跃一些，更容易拍到好角度~`);
            break;
            
        case 'ogtt':
            addUserMsg('糖耐怎么准备？');
            await delay(700);
            addAiMsg(`<strong>糖耐量检查（OGTT）</strong><br><br>📋 <strong>检查时间</strong>：孕24-28周<br>🎯 <strong>目的</strong>：筛查妊娠期糖尿病<br><br>📝 <strong>准备事项</strong>：<br>1. 检查前3天正常饮食，不要刻意控糖<br>2. 检查前一晚10点后禁食<br>3. 检查当天带点面包和水，抽完血就能吃<br>4. 需要喝75g糖水，然后分别在1h和2h抽血<br><br>💡 糖水是真的甜到齁，可以加冰或快速喝完！如果一项超标不用太紧张，饮食控制就行~`);
            break;
            
        case 'bag':
            addUserMsg('帮我看看待产包要准备什么');
            await delay(700);
            addChatCard('🎒 待产包·必备清单', `
                <div class="report-item-chat"><span class="report-icon">📄</span><div><div class="report-name">证件类</div><div class="report-detail">身份证、医保卡、产检手册、准生证</div></div></div>
                <div class="report-item-chat"><span class="report-icon">👩</span><div><div class="report-name">妈妈用品</div><div class="report-detail">产褥垫、一次性内裤、哺乳内衣、月子服、产妇卫生巾、吸管杯</div></div></div>
                <div class="report-item-chat"><span class="report-icon">👶</span><div><div class="report-name">宝宝用品</div><div class="report-detail">新生儿衣服×3、包被、尿不湿NB码、湿巾、奶瓶</div></div></div>
                <div class="report-item-chat"><span class="report-icon">🧴</span><div><div class="report-name">洗护类</div><div class="report-detail">毛巾、牙刷牙膏、脸盆、拖鞋</div></div></div>
            `);
            break;
            
        case 'mood':
            addUserMsg('最近有点焦虑...');
            await delay(800);
            addAiMsg(getMoodResponse(week));
            break;
            
        case 'report':
            addUserMsg('我想看看产检报告');
            await delay(600);
            addAiMsg('把产检报告拍照发给我就行~ 支持血常规、B超、唐筛、糖耐等报告。<br><br>📷 <em>（Demo 演示：点击下方按钮查看示例解读）</em>');
            await delay(400);
            addQuickActions([{ key: 'reportDemo', label: '查看示例解读 📋' }]);
            break;
            
        case 'reportDemo':
            addUserMsg('[图片] 血常规报告');
            await delay(1000);
            addTyping();
            await delay(1500);
            removeTyping();
            addChatCard('📋 血常规报告解读', `
                <div class="report-item-chat"><span class="report-icon">✅</span><div><div class="report-name">白细胞 10.8×10⁹/L</div><div class="report-detail">正常！孕期偏高是正常的，免疫系统在加倍保护你和宝宝</div></div></div>
                <div class="report-item-chat"><span class="report-icon">✅</span><div><div class="report-name">红细胞 3.8×10¹²/L</div><div class="report-detail">正常范围内</div></div></div>
                <div class="report-item-chat"><span class="report-icon">⚠️</span><div><div class="report-name">血红蛋白 105g/L</div><div class="report-detail">略偏低（孕期标准≥110），轻度贫血，多吃红肉、猪肝、鸭血，配合维C更好吸收</div></div></div>
                <div class="report-item-chat"><span class="report-icon">✅</span><div><div class="report-name">血小板 230×10⁹/L</div><div class="report-detail">完全正常</div></div></div>
            `);
            await delay(500);
            addAiMsg('整体很好！只有血红蛋白稍低一点，通过饮食就能改善 ❤️ 下次产检可以跟医生提一下~<br><br><small style="color:var(--text-light)">⚕️ 以上仅供参考，请以医生意见为准</small>');
            break;
    }
    
    // Show new quick actions
    await delay(600);
    const newActions = getQuickActions(week);
    newActions.unshift({ key: 'report', label: '产检报告解读 📋' });
    addQuickActions(newActions.slice(0, 4));
}

function getFoodAdvice(week) {
    if (week < 13) {
        return `孕早期饮食重点是 <strong>补叶酸 + 缓解孕吐</strong>：<br><br>
🥬 <strong>推荐</strong>：菠菜、西兰花、鸡蛋、全麦面包<br>
🍋 <strong>缓解孕吐</strong>：柠檬水、苏打饼干、小番茄<br>
🥛 <strong>每天</strong>：一杯牛奶 + 一个鸡蛋<br><br>
💡 少量多餐，别饿着也别撑着。想吃什么就吃什么，能吃进去就好~`;
    } else if (week < 28) {
        return `孕中期饮食重点是 <strong>补铁 + 补钙</strong>：<br><br>
🥩 <strong>补铁</strong>：红肉、猪肝、鸭血、黑木耳<br>
🥛 <strong>补钙</strong>：牛奶、酸奶、虾皮、豆腐<br>
🥗 <strong>维C搭配</strong>：猕猴桃、橙子（帮助铁吸收）<br><br>
💡 食欲应该比孕早期好多了，趁现在好好吃！每天需要额外增加约300卡路里~`;
    } else {
        return `孕晚期饮食重点是 <strong>控制体重 + 营养均衡</strong>：<br><br>
🐟 <strong>DHA</strong>：深海鱼（三文鱼、鳕鱼）每周2-3次<br>
🥬 <strong>纤维</strong>：蔬菜水果保证每天500g<br>
🥛 <strong>蛋白质</strong>：鸡蛋、瘦肉、豆制品<br><br>
⚠️ 注意控制主食量，少吃高糖高油食物<br>
💡 宝宝在疯狂长体重，但妈妈每周增重不要超过0.5kg哦~`;
    }
}

function getMoodResponse(week) {
    const responses = [
        `我理解你的感受 ❤️<br><br>孕期焦虑是非常非常正常的，几乎每个准妈妈都会经历。你的身体在发生巨大的变化，担心宝宝是因为你已经在用心爱TA了。<br><br>试试这些：<br>🌿 出去散步15分钟，晒晒太阳<br>🎵 听一首喜欢的音乐<br>💬 跟我聊聊，什么都可以说<br><br>你已经做得很好了，真的 💕`,
        `焦虑说明你很在乎宝宝，这本身就是爱啊 ❤️<br><br>但焦虑对你和宝宝都不好，深呼吸——<br><br>🫁 吸气4秒...保持4秒...呼气6秒...<br><br>再来一次，慢慢的~<br><br>产检结果正常就不用太担心，每个宝宝都有自己的节奏。你能做的就是好好吃饭、好好睡觉、保持好心情。这就是最好的胎教了 💕`,
    ];
    return responses[Math.floor(Math.random() * responses.length)];
}

// ===== User Input =====
function sendUserMsg() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text) return;
    input.value = '';
    
    addUserMsg(text);
    
    // Simple response
    setTimeout(() => {
        addTyping();
        setTimeout(() => {
            removeTyping();
            const response = getSimpleResponse(text);
            addAiMsg(response);
            setTimeout(() => {
                addQuickActions(getQuickActions(state.currentWeek));
            }, 400);
        }, 1000);
    }, 500);
}

function getSimpleResponse(text) {
    const lower = text.toLowerCase();
    if (lower.includes('胎动') || lower.includes('踢')) {
        return '感受到胎动啦！太棒了 🥰<br><br>一般建议从28周开始每天数胎动：每天找一个固定时间（推荐饭后），数到10次胎动所用的时间。2小时内达到10次就是正常的~<br><br>如果突然胎动明显减少或增多，要及时去医院哦！';
    }
    if (lower.includes('睡') || lower.includes('失眠')) {
        return '孕期睡眠困难太常见了 😴<br><br>试试这些：<br>🛏️ 左侧卧位，膝间夹个枕头<br>🥛 睡前喝杯温牛奶<br>🚽 傍晚后少喝水（减少起夜）<br>📱 睡前1小时放下手机<br><br>如果实在睡不着，就闭眼休息也是好的，不要有压力 💕';
    }
    if (lower.includes('谢')) {
        return '不客气~ 有任何问题随时找我聊 💕<br>我24小时都在！';
    }
    return `收到~ 你说的我都记住啦 📝<br><br>孕期有任何问题都可以问我，不管是身体变化、饮食建议还是心情聊聊天，我都在 💕`;
}

// ===== Init =====
function updateClock() {
    const now = new Date();
    document.getElementById('currentTime').textContent = now.toTimeString().slice(0,5);
}

updateClock();
setInterval(updateClock, 60000);
</script>
