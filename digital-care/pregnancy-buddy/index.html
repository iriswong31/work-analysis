<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="孕期搭子">
    <meta name="theme-color" content="#E8A0BF">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🤰</text></svg>">
    <title>孕期搭子 - AI孕期陪伴助手</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        :root {
            --pri: #E8A0BF; --pri-dk: #C88EA7; --pri-dp: #A084CA;
            --bg: #FFFAF5; --bg-chat: #FFF8F0; --white: #FFF;
            --txt: #4A3548; --txt-m: #6B5B6E; --txt-l: #9B8E9E;
            --r: 16px; --shadow: 0 2px 12px rgba(0,0,0,.08);
        }
        body { font-family: -apple-system, 'SF Pro', 'PingFang SC', sans-serif; background: var(--bg); color: var(--txt); min-height: 100vh; min-height: 100dvh; }

        /* ===== 设置弹窗（首次使用） ===== */
        .setup-overlay { position:fixed; inset:0; background:rgba(74,53,72,.85); z-index:500; display:flex; align-items:center; justify-content:center; padding:20px; }
        .setup-box { background:var(--white); border-radius:24px; padding:32px 24px; max-width:360px; width:100%; text-align:center; animation:fadeIn .4s; }
        @keyframes fadeIn { from{opacity:0;transform:scale(.9)} to{opacity:1;transform:scale(1)} }
        .setup-box h2 { font-size:24px; margin-bottom:8px; }
        .setup-box p { font-size:14px; color:var(--txt-m); margin-bottom:24px; line-height:1.6; }
        .setup-field { text-align:left; margin-bottom:16px; }
        .setup-field label { font-size:13px; font-weight:600; color:var(--txt-m); display:block; margin-bottom:6px; }
        .setup-field input, .setup-field select { width:100%; padding:12px 14px; border:1.5px solid #e8e0e8; border-radius:12px; font-size:15px; outline:none; font-family:inherit; }
        .setup-field input:focus, .setup-field select:focus { border-color:var(--pri-dp); }
        .setup-btn { width:100%; padding:14px; background:linear-gradient(135deg,var(--pri),var(--pri-dp)); color:#fff; border:none; border-radius:14px; font-size:16px; font-weight:600; cursor:pointer; margin-top:8px; }
        .setup-btn:active { transform:scale(.97); }
        .setup-btn:disabled { opacity:.5; }

        /* ===== 通知横幅 ===== */
        .notif-banner { display:none; padding:12px 16px; background:linear-gradient(135deg,#fff3e0,#fce8f0); border-bottom:1px solid #f0e8f0; font-size:13px; align-items:center; gap:8px; }
        .notif-banner.show { display:flex; }
        .notif-banner .nb-btn { padding:6px 14px; background:var(--pri-dp); color:#fff; border:none; border-radius:20px; font-size:12px; font-weight:600; cursor:pointer; margin-left:auto; white-space:nowrap; }

        /* ===== 标签页导航 ===== */
        .tabs { display:flex; position:fixed; bottom:0; left:0; right:0; background:var(--white); border-top:1px solid #f0e8f0; z-index:100; padding-bottom: env(safe-area-inset-bottom); }
        .tab { flex:1; display:flex; flex-direction:column; align-items:center; padding:8px 0 4px; font-size:11px; color:var(--txt-l); cursor:pointer; transition:.2s; }
        .tab.active { color:var(--pri-dk); }
        .tab .ico { font-size:22px; margin-bottom:2px; }

        /* ===== 页面容器 ===== */
        .page { display:none; min-height:100vh; min-height:100dvh; padding-bottom:72px; }
        .page.active { display:block; }

        /* ===== 通用头部 ===== */
        .hdr { background:linear-gradient(135deg,var(--pri),var(--pri-dp)); color:#fff; padding:48px 20px 20px; }
        .hdr h2 { font-size:20px; font-weight:600; }
        .hdr p { font-size:13px; opacity:.85; margin-top:4px; }
        .hdr .settings-icon { position:absolute; right:20px; top:48px; font-size:20px; cursor:pointer; opacity:.8; }

        /* ===== 聊天页 ===== */
        .chat-area { padding:12px 16px; overflow-y:auto; }
        .msg { display:flex; margin-bottom:14px; gap:8px; }
        .msg.ai { flex-direction:row; }
        .msg.user { flex-direction:row-reverse; }
        .avatar { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px; flex-shrink:0; }
        .msg.ai .avatar { background:linear-gradient(135deg,var(--pri),var(--pri-dp)); }
        .msg.user .avatar { background:#E8DFF0; }
        .bubble { max-width:78%; padding:12px 14px; border-radius:var(--r); font-size:14px; line-height:1.65; word-break:break-word; }
        .msg.ai .bubble { background:var(--white); border:1px solid #f0e8f0; border-top-left-radius:4px; }
        .msg.user .bubble { background:linear-gradient(135deg,var(--pri),var(--pri-dp)); color:#fff; border-top-right-radius:4px; }

        .quick { display:flex; gap:8px; overflow-x:auto; padding:8px 16px; -webkit-overflow-scrolling:touch; }
        .quick::-webkit-scrollbar { display:none; }
        .qbtn { flex-shrink:0; padding:8px 14px; background:var(--white); border:1px solid #f0e8f0; border-radius:20px; font-size:13px; cursor:pointer; white-space:nowrap; }
        .qbtn:active { background:#f8f0f8; transform:scale(.97); }

        .input-bar { position:fixed; bottom:56px; left:0; right:0; display:flex; align-items:flex-end; gap:8px; padding:8px 12px; background:var(--white); border-top:1px solid #f0e8f0; padding-bottom: calc(8px + env(safe-area-inset-bottom)); z-index:99; }
        .input-bar textarea { flex:1; border:1px solid #e8e0e8; border-radius:20px; padding:10px 14px; font-size:14px; resize:none; max-height:100px; outline:none; font-family:inherit; line-height:1.4; }
        .input-bar textarea:focus { border-color:var(--pri); }
        .ibtn { width:38px; height:38px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:18px; cursor:pointer; flex-shrink:0; border:none; }
        .ibtn.send { background:linear-gradient(135deg,var(--pri),var(--pri-dp)); color:#fff; }
        .ibtn.camera { background:#f5f0f5; color:var(--txt-m); }
        .ibtn:active { transform:scale(.92); }
        #imgInput { display:none; }
        .img-preview { max-width:200px; border-radius:12px; margin:4px 0; cursor:pointer; }

        /* ===== 提醒页 ===== */
        .remind-section { padding:16px; }
        .remind-section h3 { font-size:16px; font-weight:600; margin-bottom:12px; display:flex; align-items:center; gap:6px; }
        .card { background:var(--white); border-radius:var(--r); padding:14px 16px; margin-bottom:10px; box-shadow:var(--shadow); }
        .card .tag { display:inline-block; padding:2px 8px; border-radius:8px; font-size:11px; font-weight:600; margin-bottom:6px; }
        .tag.pink { background:#fce8f0; color:#c55; }
        .tag.purple { background:#f0e8ff; color:#8855cc; }
        .tag.green { background:#e8f8f0; color:#3a8; }
        .tag.orange { background:#fff3e0; color:#e88; }
        .card .title { font-size:14px; font-weight:600; margin-bottom:4px; }
        .card .desc { font-size:13px; color:var(--txt-m); line-height:1.5; }
        .card .time { font-size:12px; color:var(--txt-l); margin-top:6px; }

        .timeline { position:relative; padding-left:24px; }
        .timeline::before { content:''; position:absolute; left:8px; top:0; bottom:0; width:2px; background:#f0e8f0; }
        .tl-item { position:relative; margin-bottom:16px; }
        .tl-item::before { content:''; position:absolute; left:-20px; top:4px; width:12px; height:12px; border-radius:50%; background:var(--pri); border:2px solid var(--white); }
        .tl-item.done::before { background:#3a8; }
        .tl-item.next::before { background:var(--pri-dp); box-shadow:0 0 0 4px rgba(160,132,202,.2); }

        /* ===== 三餐页 ===== */
        .meal-toggle { display:flex; margin:16px; background:#f5f0f5; border-radius:24px; padding:3px; }
        .meal-toggle .opt { flex:1; text-align:center; padding:8px; border-radius:22px; font-size:14px; cursor:pointer; transition:.2s; }
        .meal-toggle .opt.active { background:var(--white); box-shadow:var(--shadow); color:var(--pri-dk); font-weight:600; }
        .meal-cards { padding:0 16px; }
        .meal-card { background:var(--white); border-radius:var(--r); padding:16px; margin-bottom:12px; box-shadow:var(--shadow); }
        .meal-card .meal-time { font-size:12px; color:var(--pri-dk); font-weight:600; margin-bottom:8px; }
        .meal-card .meal-name { font-size:16px; font-weight:600; margin-bottom:6px; }
        .meal-card .meal-desc { font-size:13px; color:var(--txt-m); line-height:1.5; }
        .meal-card .nutrients { display:flex; gap:8px; margin-top:10px; flex-wrap:wrap; }
        .meal-card .nut { padding:3px 10px; background:#f8f4ff; border-radius:10px; font-size:11px; color:var(--pri-dp); }
        .meal-card .shop-info { margin-top:10px; padding:10px 12px; background:#faf5ff; border-radius:10px; font-size:12px; color:var(--txt-m); }
        .meal-card .shop-info .name { font-weight:600; color:var(--txt); }

        /* ===== 宝宝页 ===== */
        .baby-hero { text-align:center; padding:24px 20px; }
        .baby-visual { width:120px; height:120px; border-radius:50%; background:linear-gradient(135deg,#fce8f0,#e8d8ff); display:flex; align-items:center; justify-content:center; font-size:56px; margin:0 auto 12px; animation:float 3s ease-in-out infinite; }
        @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
        .baby-info { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 16px; }
        .info-card { background:var(--white); border-radius:var(--r); padding:14px; text-align:center; box-shadow:var(--shadow); }
        .info-card .val { font-size:22px; font-weight:700; color:var(--pri-dp); }
        .info-card .lbl { font-size:12px; color:var(--txt-l); margin-top:2px; }

        /* 提醒开关 */
        .remind-toggle-section { padding:16px; }
        .remind-toggle-row { display:flex; align-items:center; justify-content:space-between; background:var(--white); border-radius:var(--r); padding:14px 16px; margin-bottom:8px; box-shadow:var(--shadow); }
        .remind-toggle-row .rtl { font-size:14px; }
        .remind-toggle-row .rts { font-size:12px; color:var(--txt-l); }
        .toggle-sw { position:relative; width:48px; height:28px; background:#ddd; border-radius:14px; cursor:pointer; transition:.3s; flex-shrink:0; }
        .toggle-sw.on { background:var(--pri-dp); }
        .toggle-sw::after { content:''; position:absolute; top:2px; left:2px; width:24px; height:24px; background:#fff; border-radius:50%; transition:.3s; }
        .toggle-sw.on::after { left:22px; }

        /* OCR 弹窗 */
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:200; justify-content:center; align-items:flex-end; }
        .modal-overlay.show { display:flex; }
        .modal-content { background:var(--white); border-radius:20px 20px 0 0; width:100%; max-height:80vh; overflow-y:auto; padding:20px; animation:slideUp .3s; }
        @keyframes slideUp { from{transform:translateY(100%)} to{transform:translateY(0)} }
        .modal-content h3 { font-size:18px; margin-bottom:16px; display:flex; justify-content:space-between; align-items:center; }
        .modal-close { font-size:24px; cursor:pointer; color:var(--txt-l); }
        .ocr-item { padding:12px 0; border-bottom:1px solid #f5f0f5; }
        .ocr-item:last-child { border:none; }
        .ocr-label { font-size:13px; color:var(--txt-l); }
        .ocr-value { font-size:15px; font-weight:600; margin:4px 0; }
        .ocr-status { font-size:13px; padding:2px 8px; border-radius:8px; display:inline-block; }
        .ocr-status.normal { background:#e8f8f0; color:#3a8; }
        .ocr-status.warn { background:#fff3e0; color:#e85; }
        .ocr-tip { font-size:12px; color:var(--txt-m); margin-top:4px; line-height:1.4; }

        .toast { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,.75); color:#fff; padding:12px 24px; border-radius:12px; font-size:14px; z-index:999; opacity:0; transition:opacity .3s; pointer-events:none; }
        .toast.show { opacity:1; }
    </style>
</head>
<body>

<!-- ===== 首次设置弹窗 ===== -->
<div class="setup-overlay" id="setupOverlay" style="display:none">
    <div class="setup-box">
        <div style="font-size:48px;margin-bottom:8px">🤰</div>
        <h2>孕期搭子</h2>
        <p>你好准妈妈！先做一点简单设置，<br>就能获得专属的孕期陪伴体验 💕</p>
        <div class="setup-field">
            <label>👶 预产期</label>
            <input type="date" id="setupDueDate" value="">
        </div>
        <div class="setup-field">
            <label>🍽 三餐提醒时间</label>
            <select id="setupMealPlan">
                <option value="standard">标准（早7:30 / 午12:00 / 晚18:30）</option>
                <option value="late">晚起型（早9:00 / 午13:00 / 晚19:30）</option>
                <option value="early">早起型（早6:30 / 午11:30 / 晚17:30）</option>
            </select>
        </div>
        <div class="setup-field">
            <label>💊 加餐提醒</label>
            <select id="setupSnack">
                <option value="yes">开启（上午10:00 / 下午15:00）</option>
                <option value="no">不需要</option>
            </select>
        </div>
        <button class="setup-btn" id="setupBtn" onclick="saveSetup()">开始使用 ✨</button>
    </div>
</div>

<!-- ===== 通知权限横幅 ===== -->
<div class="notif-banner" id="notifBanner">
    <span>🔔 开启通知，到点提醒你吃饭、产检</span>
    <button class="nb-btn" onclick="requestNotifPermission()">开启提醒</button>
</div>

<!-- ===== 页面1: 聊天 ===== -->
<div class="page active" id="pgChat">
    <div class="hdr" style="position:relative">
        <h2>🤰 孕期搭子</h2>
        <p id="hdrInfo">加载中...</p>
        <span class="settings-icon" onclick="showSetup()">⚙️</span>
    </div>
    <div class="quick" id="quickBtns"></div>
    <div class="chat-area" id="chatArea"></div>
    <div class="input-bar" id="chatInput">
        <input type="file" id="imgInput" accept="image/*" capture="environment">
        <button class="ibtn camera" onclick="document.getElementById('imgInput').click()" title="拍照/上传">📷</button>
        <textarea id="msgInput" rows="1" placeholder="输入消息..." oninput="autoResize(this)"></textarea>
        <button class="ibtn send" onclick="sendMsg()">➤</button>
    </div>
</div>

<!-- ===== 页面2: 提醒 ===== -->
<div class="page" id="pgRemind">
    <div class="hdr">
        <h2>🔔 提醒中心</h2>
        <p id="remindDate"></p>
    </div>
    <div class="remind-toggle-section">
        <h3 style="font-size:16px;font-weight:600;margin-bottom:12px">⏰ 提醒设置</h3>
        <div class="remind-toggle-row">
            <div><div class="rtl">🍽 三餐提醒</div><div class="rts" id="mealTimeText">早7:30 / 午12:00 / 晚18:30</div></div>
            <div class="toggle-sw on" id="toggleMeal" onclick="toggleReminder('meal')"></div>
        </div>
        <div class="remind-toggle-row">
            <div><div class="rtl">💊 加餐提醒</div><div class="rts">上午10:00 / 下午15:00</div></div>
            <div class="toggle-sw on" id="toggleSnack" onclick="toggleReminder('snack')"></div>
        </div>
        <div class="remind-toggle-row">
            <div><div class="rtl">🏥 产检提醒</div><div class="rts">产检前3天提醒</div></div>
            <div class="toggle-sw on" id="toggleCheckup" onclick="toggleReminder('checkup')"></div>
        </div>
        <div class="remind-toggle-row">
            <div><div class="rtl">💧 喝水提醒</div><div class="rts">每2小时提醒一次</div></div>
            <div class="toggle-sw" id="toggleWater" onclick="toggleReminder('water')"></div>
        </div>
    </div>
    <div class="remind-section">
        <h3>🏥 产检计划</h3>
        <div id="checkupTimeline" class="timeline"></div>
    </div>
    <div class="remind-section">
        <h3>📦 本周准备</h3>
        <div id="prepCards"></div>
    </div>
    <div class="remind-section">
        <h3>💡 注意事项</h3>
        <div id="tipsCards"></div>
    </div>
</div>

<!-- ===== 页面3: 三餐 ===== -->
<div class="page" id="pgMeal">
    <div class="hdr">
        <h2>🍽 今日三餐</h2>
        <p id="mealWeekInfo"></p>
    </div>
    <div class="meal-toggle">
        <div class="opt active" onclick="switchMeal('home')">🏠 在家做</div>
        <div class="opt" onclick="switchMeal('out')">🛵 点外卖</div>
    </div>
    <div class="meal-cards" id="mealCards"></div>
</div>

<!-- ===== 页面4: 宝宝 ===== -->
<div class="page" id="pgBaby">
    <div class="hdr">
        <h2>👶 宝宝发育</h2>
        <p id="babyWeekTitle"></p>
    </div>
    <div class="baby-hero">
        <div class="baby-visual" id="babyEmoji">🫘</div>
        <p style="font-size:15px;font-weight:600;" id="babySizeText"></p>
        <p style="font-size:13px;color:var(--txt-m);margin-top:4px;" id="babyDevText"></p>
    </div>
    <div class="baby-info" id="babyStats"></div>
</div>

<!-- OCR 弹窗 -->
<div class="modal-overlay" id="ocrModal">
    <div class="modal-content">
        <h3>📋 产检报告解读 <span class="modal-close" onclick="closeModal()">&times;</span></h3>
        <div id="ocrResult"></div>
    </div>
</div>

<div class="toast" id="toast"></div>

<!-- 底部导航 -->
<div class="tabs">
    <div class="tab active" onclick="switchPage('pgChat')"><span class="ico">💬</span>聊天</div>
    <div class="tab" onclick="switchPage('pgRemind')"><span class="ico">🔔</span>提醒</div>
    <div class="tab" onclick="switchPage('pgMeal')"><span class="ico">🍽</span>三餐</div>
    <div class="tab" onclick="switchPage('pgBaby')"><span class="ico">👶</span>宝宝</div>
</div>

<script>
// ========================================
// 配置管理（localStorage 持久化）
// ========================================
const DEFAULT_CONFIG = {
    dueDate: '',
    lmpDate: '',
    mealPlan: 'standard',
    snack: 'yes',
    reminders: { meal:true, snack:true, checkup:true, water:false },
    setupDone: false
};

function getConfig() {
    try {
        const saved = localStorage.getItem('pregnancy_buddy_config');
        return saved ? { ...DEFAULT_CONFIG, ...JSON.parse(saved) } : { ...DEFAULT_CONFIG };
    } catch(e) { return { ...DEFAULT_CONFIG }; }
}

function saveConfig(cfg) {
    localStorage.setItem('pregnancy_buddy_config', JSON.stringify(cfg));
}

const MEAL_TIMES = {
    standard: { breakfast:'07:30', lunch:'12:00', dinner:'18:30', label:'早7:30 / 午12:00 / 晚18:30' },
    late:     { breakfast:'09:00', lunch:'13:00', dinner:'19:30', label:'早9:00 / 午13:00 / 晚19:30' },
    early:    { breakfast:'06:30', lunch:'11:30', dinner:'17:30', label:'早6:30 / 午11:30 / 晚17:30' }
};

// ========================================
// 首次设置
// ========================================
function showSetup() {
    const cfg = getConfig();
    if (cfg.dueDate) document.getElementById('setupDueDate').value = cfg.dueDate;
    document.getElementById('setupMealPlan').value = cfg.mealPlan || 'standard';
    document.getElementById('setupSnack').value = cfg.snack || 'yes';
    document.getElementById('setupOverlay').style.display = 'flex';
}

function saveSetup() {
    const dueDate = document.getElementById('setupDueDate').value;
    if (!dueDate) { showToast('请选择预产期'); return; }
    const due = new Date(dueDate);
    const lmpDate = new Date(due.getTime() - 280 * 86400000);
    const lmpStr = lmpDate.toISOString().split('T')[0];
    const cfg = getConfig();
    cfg.dueDate = dueDate;
    cfg.lmpDate = lmpStr;
    cfg.mealPlan = document.getElementById('setupMealPlan').value;
    cfg.snack = document.getElementById('setupSnack').value;
    cfg.setupDone = true;
    saveConfig(cfg);
    document.getElementById('setupOverlay').style.display = 'none';
    initApp();
    showToast('设置成功 ✨');
    // 检查通知权限
    setTimeout(checkNotifPermission, 1000);
}

// ========================================
// 通知系统
// ========================================
let notifTimers = [];

function checkNotifPermission() {
    if (!('Notification' in window)) return;
    if (Notification.permission === 'default') {
        document.getElementById('notifBanner').classList.add('show');
    } else if (Notification.permission === 'granted') {
        scheduleNotifications();
    }
}

function requestNotifPermission() {
    if (!('Notification' in window)) {
        showToast('当前浏览器不支持通知');
        document.getElementById('notifBanner').classList.remove('show');
        return;
    }
    Notification.requestPermission().then(perm => {
        document.getElementById('notifBanner').classList.remove('show');
        if (perm === 'granted') {
            showToast('通知已开启 🔔');
            scheduleNotifications();
        } else {
            showToast('已拒绝通知权限');
        }
    });
}

function scheduleNotifications() {
    // 清除旧定时器
    notifTimers.forEach(t => clearTimeout(t));
    notifTimers = [];
    const cfg = getConfig();
    if (!cfg.setupDone) return;
    const times = MEAL_TIMES[cfg.mealPlan] || MEAL_TIMES.standard;
    const info = getWeekInfo();

    // 三餐通知
    if (cfg.reminders.meal) {
        scheduleDailyNotif(times.breakfast, '🌅 早餐时间', getMealHint('breakfast', info.weeks), 'breakfast');
        scheduleDailyNotif(times.lunch, '☀️ 午餐时间', getMealHint('lunch', info.weeks), 'lunch');
        scheduleDailyNotif(times.dinner, '🌙 晚餐时间', getMealHint('dinner', info.weeks), 'dinner');
    }

    // 加餐通知
    if (cfg.reminders.snack && cfg.snack === 'yes') {
        scheduleDailyNotif('10:00', '🍎 上午加餐', '来点坚果或水果，给宝宝加油~', 'snack-am');
        scheduleDailyNotif('15:00', '🥛 下午加餐', '喝杯酸奶或吃几颗核桃，补充DHA~', 'snack-pm');
    }

    // 喝水提醒
    if (cfg.reminders.water) {
        for (let h = 8; h <= 20; h += 2) {
            const t = String(h).padStart(2,'0') + ':00';
            scheduleDailyNotif(t, '💧 喝水时间', '孕期每天需要1500-2000ml水哦~', 'water-' + h);
        }
    }
}

function scheduleDailyNotif(timeStr, title, body, tag) {
    const [h, m] = timeStr.split(':').map(Number);
    const now = new Date();
    const target = new Date(now.getFullYear(), now.getMonth(), now.getDate(), h, m, 0);
    let delay = target - now;
    if (delay < 0) delay += 86400000; // 明天
    if (delay > 86400000) return; // 安全边界

    const timer = setTimeout(() => {
        if (Notification.permission === 'granted') {
            new Notification(title, { body, icon:'🤰', tag, requireInteraction:false });
        }
        // 明天同一时间再来
        scheduleDailyNotif(timeStr, title, body, tag);
    }, delay);
    notifTimers.push(timer);
}

function getMealHint(meal, weeks) {

// ========================================
// 核心孕周计算
// ========================================
function getWeekInfo() {
    const cfg = getConfig();
    const lmpStr = cfg.lmpDate || '2024-08-17';
    const dueStr = cfg.dueDate || '2025-05-24';
    const today = new Date();
    const lmp = new Date(lmpStr);
    const days = Math.floor((today - lmp) / 86400000);
    const weeks = Math.floor(days / 7);
    const dayOfWeek = days % 7;
    const due = new Date(dueStr);
    const daysLeft = Math.max(0, Math.floor((due - today) / 86400000));
    const trimester = weeks < 13 ? 1 : weeks < 28 ? 2 : 3;
    return { weeks, dayOfWeek, days, daysLeft, trimester };
}

    if (t.includes('体重') || t.includes('长胖') || t.includes('增重')) {
        const gain = w < 13 ? '1-2kg' : w < 28 ? '总增4-7kg' : '总增10-14kg';
        return '孕' + w + '周参考增重：约' + gain + '<br><br>📌 孕早期：总共增1-2kg<br>📌 孕中晚期：每周约0.3-0.5kg<br><br>💡 控制体重不是少吃，而是吃对！';
    }
    if (t.includes('睡') || t.includes('失眠'))
        return '孕期睡眠不容易 😪<br><br><b>推荐：</b>左侧卧 + 孕妇U型枕<br><br>🥛 睡前温牛奶<br>🦶 温水泡脚15分钟<br>📱 睡前1小时放下手机<br>🎵 听白噪音';
    if (t.includes('运动') || t.includes('散步'))
        return '孕期适量运动很好！🏃‍♀️<br><br>🚶 散步30分钟/天<br>🧘 孕妇瑜伽<br>🏊 游泳<br><br>❌ 避免剧烈运动<br>❌ 心率不超过140';
    const defaults = [
        '我在呢~ 😊 试试问我：<br>• 宝宝现在多大了？<br>• 今天吃什么好？<br>• 拍产检报告给我解读',
        '收到！让我想想... 🤔<br><br>我最擅长：📋 产检解读 · 🍽 三餐推荐 · 👶 发育跟踪 · 🔔 提醒管理'
    ];
    return defaults[Math.floor(Math.random() * defaults.length)];
}

// ========================================
// 图片上传 & OCR
// ========================================
document.getElementById('imgInput').addEventListener('change', function(e) {
    const file = e.target.files[0]; if (!file) return;
    const reader = new FileReader();
    reader.onload = function(ev) {
        addMsg('user', '<img class="img-preview" src="' + ev.target.result + '">');
        addTypingMsg();
        setTimeout(() => {
            removeTyping();
            addMsg('ai', '收到报告！正在识别... 📋');
            setTimeout(() => {
                const types = ['blood','bchao','glucose'];
                const type = types[Math.floor(Math.random() * types.length)];
                addMsg('ai', '✅ 识别完成！这是<b>' + OCR_DEMOS[type].title + '</b><br><br><span class="qbtn" onclick="showOcrDemo(\'' + type + '\')">📋 查看解读结果</span>');
            }, 1500);
        }, 1000);
    };
    reader.readAsDataURL(file);
    e.target.value = '';
});

function showOcrDemo(type) {
    const data = OCR_DEMOS[type];
    let html = '';
    data.items.forEach(item => {
        html += '<div class="ocr-item"><div class="ocr-label">' + item.name + '</div><div class="ocr-value">' + item.value + ' <span style="font-size:12px;color:var(--txt-l)">(参考：' + item.range + ')</span></div><span class="ocr-status ' + item.status + '">' + (item.status === 'normal' ? '✅ 正常' : '⚠️ 偏高') + '</span><div class="ocr-tip">' + item.tip + '</div></div>';
    });
    html += '<div style="margin-top:16px;padding:14px;background:#faf5ff;border-radius:12px;font-size:14px;line-height:1.6">' + data.summary.replace(/\n/g,'<br>') + '</div>';
    document.getElementById('ocrResult').innerHTML = html;
    document.getElementById('ocrModal').classList.add('show');
}
function closeModal() { document.getElementById('ocrModal').classList.remove('show'); }

// ========================================
// 提醒页
// ========================================
function renderRemind() {
    const info = getWeekInfo();
    const cfg = getConfig();
    document.getElementById('remindDate').textContent = '孕' + info.weeks + '周' + info.dayOfWeek + '天 · 距预产期' + info.daysLeft + '天';
    const mt = MEAL_TIMES[cfg.mealPlan] || MEAL_TIMES.standard;
    document.getElementById('mealTimeText').textContent = mt.label;

    // 开关状态
    ['meal','snack','checkup','water'].forEach(key => {
        const el = document.getElementById('toggle' + key.charAt(0).toUpperCase() + key.slice(1));
        if (el) el.classList.toggle('on', cfg.reminders[key]);
    });

    // 产检时间线
    let tlHtml = '';
    CHECKUPS.forEach(c => {
        const status = info.weeks > c.week + 1 ? 'done' : (info.weeks >= c.week - 2 && info.weeks <= c.week + 1) ? 'next' : '';
        const isNext = status === 'next';
        tlHtml += '<div class="tl-item ' + status + '"><div class="card" style="' + (isNext ? 'border:2px solid var(--pri-dp)' : '') + '"><span class="tag ' + (c.important ? 'pink' : 'purple') + '">' + (c.important ? '重要' : '常规') + ' · 第' + c.week + '周</span>' + (isNext ? '<span class="tag orange" style="margin-left:4px">⏰ 即将到来</span>' : '') + '<div class="title">' + c.name + '</div><div class="desc">' + c.items + '</div>' + (status === 'done' ? '<div class="time" style="color:#3a8">✅ 已完成</div>' : '') + '</div></div>';
    });
    document.getElementById('checkupTimeline').innerHTML = tlHtml;

    // 准备
    const preps = info.trimester === 1 ? [
        { title:'补充叶酸', desc:'每天0.4mg叶酸，持续到孕12周', tag:'pink' },
        { title:'建档准备', desc:'选择分娩医院，准备母子手册、身份证、医保卡', tag:'purple' }
    ] : info.trimester === 2 ? [
        { title:'准备待产包', desc:'住院证件、婴儿衣物、产褥垫、吸奶器...', tag:'pink' },
        { title:'拍孕照', desc:'24-30周是拍孕照的最佳时期！', tag:'purple' }
    ] : [
        { title:'练习拉玛泽呼吸', desc:'分娩时的减痛呼吸法，每天练10分钟', tag:'pink' },
        { title:'确认待产包', desc:'核对清单，确保证件、衣物、用品齐全', tag:'orange' },
        { title:'了解分娩征兆', desc:'见红、破水、规律宫缩——什么时候该去医院', tag:'pink' }
    ];
    document.getElementById('prepCards').innerHTML = preps.map(p => '<div class="card"><span class="tag ' + p.tag + '">' + (p.tag==='pink'?'重要':'建议') + '</span><div class="title">' + p.title + '</div><div class="desc">' + p.desc + '</div></div>').join('');

    // 注意事项
    const tips = info.trimester === 1 ? [
        '避免接触猫砂（弓形虫风险）',
        '不吃生鱼片、半生牛排、未杀菌奶制品',
        '每天咖啡因 < 200mg（约1杯美式）'
    ] : info.trimester === 2 ? [
        '左侧睡有利于胎盘供血',
        '注意妊娠纹预防（橄榄油/Bio-Oil）',
        '适量运动，每天散步30分钟'
    ] : [
        '每天数胎动（饭后安静数，2h内10次正常）',
        '规律宫缩（5分钟一次、持续1小时）→ 去医院',
        '保持手机畅通，随时可能发动'
    ];
    document.getElementById('tipsCards').innerHTML = tips.map(t => '<div class="card"><div class="desc">💡 ' + t + '</div></div>').join('');
}

// ========================================
// 三餐页
// ========================================
let currentMealType = 'home';
function switchMeal(type) {
    currentMealType = type;
    document.querySelectorAll('.meal-toggle .opt').forEach(o => o.classList.remove('active'));
    event.target.classList.add('active');
    renderMeals(type);
}
function renderMeals(type) {
    const w = getWeekInfo().weeks;
    document.getElementById('mealWeekInfo').textContent = '孕' + w + '周 · ' + (type === 'home' ? '居家餐食方案' : '外卖推荐方案');
    const meals = getMeals(w, type);
    document.getElementById('mealCards').innerHTML = meals.map(m => {
        let shopHtml = m.shop ? '<div class="shop-info">🏪 <span class="name">' + m.shop + '</span><br>💡 ' + m.tip + '</div>' : '';
        return '<div class="meal-card"><div class="meal-time">' + m.time + '</div><div class="meal-name">' + m.name + '</div><div class="meal-desc">' + m.desc + '</div><div class="nutrients">' + m.nuts.map(n => '<span class="nut">' + n + '</span>').join('') + '</div>' + shopHtml + '</div>';
    }).join('');
}

// ========================================
// 宝宝页
// ========================================
function renderBaby() {
    const info = getWeekInfo();
    const baby = getBabyData(info.weeks);
    document.getElementById('babyWeekTitle').textContent = '第' + info.weeks + '周' + info.dayOfWeek + '天';
    document.getElementById('babyEmoji').textContent = baby.emoji;
    document.getElementById('babySizeText').textContent = baby.size;
    document.getElementById('babyDevText').textContent = baby.dev;
    document.getElementById('babyStats').innerHTML =
        '<div class="info-card"><div class="val">' + info.weeks + 'W' + info.dayOfWeek + 'D</div><div class="lbl">当前孕周</div></div>' +
        '<div class="info-card"><div class="val">' + info.daysLeft + '</div><div class="lbl">距预产期(天)</div></div>' +
        '<div class="info-card"><div class="val">' + baby.weight + '</div><div class="lbl">参考体重</div></div>' +
        '<div class="info-card"><div class="val">第' + info.trimester + '期</div><div class="lbl">孕期阶段</div></div>';
}

// ========================================
// Toast
// ========================================
function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
}

// ========================================
// 初始化
// ========================================
function initApp() {
    const cfg = getConfig();
    const info = getWeekInfo();
    const baby = getBabyData(info.weeks);

    document.getElementById('hdrInfo').textContent = '孕' + info.weeks + '周' + info.dayOfWeek + '天 · 距预产期' + info.daysLeft + '天';

    const quicks = [
        { text:'📋 产检报告解读', msg:'帮我看看产检报告' },
        { text:'🍽 今天吃什么', msg:'今天吃什么好' },
        { text:'👶 宝宝多大了', msg:'宝宝现在多大了' },
        { text:'🤢 缓解孕吐', msg:'孕吐好难受' },
        { text:'⚖️ 体重管理', msg:'体重增长正常吗' },
        { text:'😴 睡眠问题', msg:'晚上睡不好' },
        { text:'🏃 孕期运动', msg:'可以做什么运动' }
    ];
    document.getElementById('quickBtns').innerHTML = quicks.map(q => '<div class="qbtn" onclick="sendQuick(\'' + q.msg + '\')">' + q.text + '</div>').join('');

    // 欢迎消息
    chatArea.innerHTML = '';
    const hour = new Date().getHours();
    const greeting = hour < 11 ? '早上好' : hour < 14 ? '中午好' : hour < 18 ? '下午好' : '晚上好';
    addMsg('ai', greeting + '呀准妈妈~ ☀️<br><br>今天是<b>孕' + info.weeks + '周' + info.dayOfWeek + '天</b>，距离和宝宝见面还有<b>' + info.daysLeft + '天</b>。<br><br>宝宝现在约 ' + baby.size + '，' + baby.dev + '<br><br>💬 有什么想聊的随时说，也可以拍产检报告给我解读~');

    document.getElementById('remindDate').textContent = new Date().toLocaleDateString('zh-CN', {month:'long',day:'numeric',weekday:'long'});

    document.getElementById('msgInput').addEventListener('keydown', function(e) {
        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
    });
    document.getElementById('ocrModal').addEventListener('click', function(e) { if (e.target === this) closeModal(); });
}

// ========================================
// 启动
// ========================================
(function boot() {
    // 注册 Service Worker（PWA 离线 + 添加到主屏幕）
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').catch(() => {});
    }
    const cfg = getConfig();
    if (!cfg.setupDone) {
        // 默认预产期（便于演示）
        const defDate = new Date();
        defDate.setDate(defDate.getDate() + 60);
        document.getElementById('setupDueDate').value = defDate.toISOString().split('T')[0];
        document.getElementById('setupOverlay').style.display = 'flex';
    } else {
        initApp();
        setTimeout(checkNotifPermission, 500);
        scheduleNotifications();
    }
})();
</script>
